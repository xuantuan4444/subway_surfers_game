<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subway Runner 3D</title>
    <style>
        /* Reset margin để game full màn hình */
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #000; /* Màu nền dự phòng */
        }
        
        /* Canvas chiếm toàn bộ màn hình */
        canvas { 
            display: block; 
            width: 100vw; 
            height: 100vh; 
        }

        /* UI đơn giản */
        #ui {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 24px;
            font-weight: bold;
            z-index: 10;
            pointer-events: none; /* Để click xuyên qua UI vào game */
        }
    </style>
</head>
<body>

    <!-- 🔥 ĐÂY LÀ PHẦN BẠN THIẾU: Canvas để Three.js vẽ game vào -->
    <canvas id="gameCanvas"></canvas>

    <!-- Giao diện điểm số -->
    <div id="ui">
        Score: <span id="score">0</span>
    </div>

    <!-- Cấu hình Import Map cho Three.js -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <!-- Chạy code game -->
    <script type="module" src="./src/main.js"></script>

</body>
</html>
