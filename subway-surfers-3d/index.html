<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subway Surfers 3D</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div id="score">Score: 0</div>
        
        <!-- 🔥 DÒNG MỚI: Hiển thị số mạng -->
        <div id="lives" style="position: absolute; top: 20px; right: 20px; font-size: 28px; color: white; text-shadow: 2px 2px 4px #000;">❤️❤️</div>
        
        <div id="game-over" style="display: none; flex-direction: column; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); color: white; z-index: 100;">
            <h1 style="font-size: 48px; margin-bottom: 10px;">💥 GAME OVER</h1>
            <p style="font-size: 24px; margin-bottom: 30px;">Final Score: <span id="final-score">0</span></p>
            <button id="restart-btn" style="padding: 15px 40px; font-size: 20px; cursor: pointer; background: #ffcc00; border: none; border-radius: 8px; font-weight: bold;">Chơi Lại</button>
        </div>
    </div>

    <!-- Import Three.js từ CDN -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
    </script>

    <!-- Game script -->
    <script type="module" src="./src/main.js"></script>
</body>
</html>
