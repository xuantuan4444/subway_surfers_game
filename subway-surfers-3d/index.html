<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="image/logo.png">
    <title>Alo Vu a Vu !</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-layer">
        <div id="hud-top">
            <button id="pause-btn" type="button" aria-label="Pause game" title="Pause">
                <span class="pause-icon" aria-hidden="true">
                    <span></span>
                    <span></span>
                </span>
            </button>
            <div id="hud-right">
                <div id="score">Score: 0</div>
                <div id="coin-count" aria-label="Coins collected">
                    <span class="coin-hud-icon" aria-hidden="true"></span>
                    <span id="coin-value">0</span>
                </div>
                <div id="powerup-hud"></div>
            </div>
        </div>

        <div id="intro-overlay">
            <h1>ESCAPE FROM Đỗ Mĩ Chi</h1>
            <div id="intro-prompt">
                <p>PRESS SPACE OR TAP TO START</p>
            </div>
        </div>

        <div id="pause-menu">
            <div id="pause-menu-panel">
                <button class="pause-menu-btn" id="continue-btn" type="button">CONTINUE</button>
                <button class="pause-menu-btn" id="new-game-btn" type="button">NEW GAME</button>
                <button class="pause-menu-btn" id="quit-btn" type="button">QUIT</button>
            </div>
        </div>

        <div id="game-over">
            <div id="game-over-content">
                <div id="game-over-ribbon">GAME OVER</div>
                <div id="game-over-stars" aria-hidden="true">
                    <span class="game-over-star">★</span>
                    <span class="game-over-star is-main">★</span>
                    <span class="game-over-star">★</span>
                </div>
                <div class="game-over-section">
                    <p class="game-over-label">YOUR SCORE</p>
                    <div class="game-over-pill score-pill">
                        <span id="final-score">0</span>
                    </div>
                </div>
                <div class="game-over-section">
                    <p class="game-over-label">REWARDS</p>
                    <div class="game-over-pill reward-pill">
                        <span class="coin-hud-icon reward-coin-icon" aria-hidden="true"></span>
                        <span id="final-coins">0</span>
                    </div>
                </div>
                <div id="game-over-actions">
                    <button class="game-over-btn quit-btn" id="game-over-quit-btn" type="button">Quit</button>
                    <button class="game-over-btn retry-btn" id="restart-btn" type="button">RETRY</button>
                </div>
            </div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module" src="./src/main.js"></script>
</body>
</html>
