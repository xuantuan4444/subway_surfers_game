<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="image/logo.png">
    <title>Alo Vu a Vu !</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-layer">
        <div id="hud-top">
            <div id="score">Score: 0</div>
            <div id="hud-right">
                <div id="lives">❤️❤️</div>
                <div id="powerup-hud"></div>
            </div>
        </div>

        <div id="intro-overlay">
            <h1>ESCAPE FROM DOMIXI</h1>
            <div id="intro-prompt">
                <p>PRESS SPACE OR TAP TO START</p>
            </div>
        </div>

        <div id="game-over">
            <div id="game-over-content">
                <div id="game-over-icon">💥</div>
                <h1>GAME OVER</h1>
                <div id="final-score-wrapper">
                    <p id="final-score-label">FINAL SCORE</p>
                    <p id="final-score">0</p>
                </div>
                <button id="restart-btn">CHƠI LẠI</button>
            </div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module" src="./src/main.js"></script>
</body>
</html>
